<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>安阳城市轨迹 - 旅·分享</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>#map{height:520px;border-radius:8px}</style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><a href="index.html">旅·分享（安阳）</a></h1>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="track.html">城市轨迹</a>
        <a href="photos.html">风景照片</a>
        <a href="videos.html">视频分享</a>
        <a href="food.html">美食分享</a>
        <a href="guides.html">游玩攻略</a>
      </nav>
      <button class="menu-toggle" aria-label="菜单">☰</button>
    </div>
  </header>

  <main class="container section">
    <h2>安阳城市轨迹（示例）</h2>
    <p>起点：安阳工学院。依次经过：文峰塔、殷墟博物馆、北大街美食街、中国文字博物馆。</p>
    <div id="map"></div>

    <div class="section">
      <h3>轨迹事件（时间轴）</h3>
      <ol id="timeline" class="timeline"></ol>
      <p>位置为近似坐标，仅用于演示轨迹效果；你可以在源码中调整坐标以更精确匹配实际位置。</p>
    </div>
  </main>

  <footer class="site-footer"><div class="container">© 2026 旅·分享（安阳）</div></footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
  <script>
    // 近似坐标（安阳市及景点近似位置）
    const coords = [
      [36.1400, 114.3200], // 起点：安阳工学院（近似）
      [36.1008, 114.3578], // 文峰塔（近似）
      [36.1280, 114.3515], // 殷墟博物馆（近似）
      [36.0945, 114.3410], // 北大街美食街（近似）
      [36.1022, 114.3526], // 中国文字博物馆（近似）
      [36.1400, 114.3200]  // 回到起点（可选）
    ];
    const events = [
      {title: '起点：安阳工学院', desc: '在校门集合，准备出发。'},
      {title: '文峰塔', desc: '文峰塔是安阳的地标之一，可以爬塔眺望市区。'},
      {title: '殷墟博物馆', desc: '殷墟是商代晚期都城遗址，历史意义重大。'},
      {title: '北大街美食街', desc: '品尝本地小吃与特色美食。'},
      {title: '中国文字博物馆', desc: '了解汉字起源与演变的好地方。'},
      {title: '结束：返回安阳工学院', desc: '活动结束，返回学校。'}
    ];

    document.addEventListener('DOMContentLoaded', () => {
      if (!document.getElementById('map')) return;
      const map = L.map('map').setView([36.11, 114.34], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
      }).addTo(map);

      const poly = L.polyline(coords, {color:'#0ea5a4'}).addTo(map);
      map.fitBounds(poly.getBounds(), {padding:[20,20]});

      const timelineEl = document.getElementById('timeline');
      events.forEach((e,i)=>{
        const m = L.marker(coords[i]).addTo(map).bindPopup(`<b>${e.title}</b><div>${e.desc}</div>`);
        const li = document.createElement('li');
        li.innerHTML = `<strong>${e.title}</strong><p>${e.desc}</p>`;
        li.addEventListener('click', ()=>{ map.panTo(coords[i]); m.openPopup(); });
        timelineEl.appendChild(li);
      });
    });
  </script>
</body>
</html>
