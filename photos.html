  <main class="container section">
    <h2>风景相册</h2>
    <p>上传小图片（演示用，文件会以 DataURL 保存到 localStorage，仅用于作业演示）。</p>

    <div class="upload-row">
      <input type="file" id="photo-input" accept="image/*" multiple />
      <button id="export-photos">导出相册 JSON</button>
      <button id="import-photos">从 JSON 导入（粘贴）</button>
    </div>

    <div class="gallery" id="photo-gallery">
      <!-- 示例图片 -->
      <img src="assets/photo1.svg" alt="示例1" />
      <img src="assets/photo2.svg" alt="示例2" />
      <img src="assets/photo3.svg" alt="示例3" />
    </div>

    <div id="modal" class="modal" aria-hidden="true"><img id="modal-img" src=""><button id="modal-close">✕</button></div>
  </main>
